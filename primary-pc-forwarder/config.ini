# ──────────────────────────────────────────────────────────────────────────────
# HID Forwarder Configuration
# ──────────────────────────────────────────────────────────────────────────────

# Target Linux PC network settings
# The IP address and UDP port of the receiver on the secondary machine.
target_ip = 172.20.10.13
target_port = 5555

# Logging verbosity
#   0 = silent   — no output at all
#   1 = errors   — only errors
#   2 = info     — startup/shutdown messages + errors
#   3 = debug    — every packet logged (very noisy)
log_level = 2

# Delta mode
#   true  = assistive software sends relative mouse movements
#           (dx/dy are computed as injected_pos − current_cursor_pos)
#   false = assistive software sends absolute screen coordinates
#           (the raw x/y from the injected event are forwarded as-is)
use_relative_deltas = true

# ── Cloud Relay (for cross-network / WAN connectivity) ──
# Set use_relay = true to also stream via WebSocket relay
use_relay = false
relay_url = wss://anthe.auraplot.site:8765
relay_key = Hy781106!

# Set to false if using self-signed TLS certificates
relay_verify_tls = true
