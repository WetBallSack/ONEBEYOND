[network]
# UDP port to listen on for incoming HID packets from Primary PC
udp_port = 5555

[bluetooth]
# Bluetooth device name as seen by the Primary PC
device_name = HID-Bridge Mouse

[performance]
# Dispatch rate in Hz (125 = 8ms, 250 = 4ms, 1000 = 1ms)
dispatch_rate_hz = 125

[logging]
# 0=silent, 1=errors, 2=info, 3=debug
log_level = 2
